<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0B2545"/>
  <!-- Background subtle grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Accent rule -->
  <rect x="80" y="180" width="48" height="1" fill="#4A7FB5"/>
  <!-- Brand wordmark -->
  <text x="80" y="168" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#4A7FB5" text-anchor="start">AGI&amp;M ASSETS INC.</text>
  <!-- Main headline -->
  <text x="80" y="272" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="52" font-weight="275" letter-spacing="-1.5" fill="#FFFFFF" text-anchor="start">Battery Cell</text>
  <text x="80" y="340" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="52" font-weight="275" letter-spacing="-1.5" fill="#FFFFFF" text-anchor="start">Sourcing Inquiry</text>
  <!-- Descriptor -->
  <text x="80" y="400" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="0" fill="#5E7A99" text-anchor="start">International B2B procurement portal for lithium battery cell sourcing.</text>
  <!-- Divider -->
  <rect x="80" y="460" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <!-- Footer -->
  <text x="80" y="490" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="2" fill="rgba(255,255,255,0.3)" text-anchor="start">apps.agim.ca/battery/inquiry</text>
</svg>
