<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquiry Received — AGI&amp;M</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="/shared/assets/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/shared/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="../../shared/css/tokens.css">
  <link rel="stylesheet" href="../../shared/css/base.css">
  <link rel="stylesheet" href="css/form.css">
  <style>
    .confirm-shell{max-width:var(--max-w-form);margin:0 auto}
    .status-banner{display:flex;align-items:center;gap:var(--sp-m);background:var(--color-success-bg);border-left:3px solid var(--color-success);padding:var(--sp-m) var(--sp-l);margin-bottom:var(--sp-2xl)}
    .status-icon{color:var(--color-success);flex-shrink:0}
    .status-text{font-size:var(--text-xs);font-weight:700;color:var(--color-success);letter-spacing:.1em;text-transform:uppercase}
    .id-block{background:var(--white);border:1px solid var(--color-border-medium);padding:var(--sp-l);margin-bottom:var(--sp-l)}
    .id-label{font-size:var(--text-label);letter-spacing:.15em;text-transform:uppercase;color:var(--steel);display:block;margin-bottom:var(--sp-xs)}
    .id-value{font-family:var(--font-mono);font-size:16px;font-weight:600;color:var(--navy);display:block;margin-bottom:var(--sp-s);word-break:break-all}
    .id-ts{font-size:var(--text-xs);color:var(--steel);display:block}
    .btn-copy{display:inline-flex;align-items:center;gap:6px;margin-top:var(--sp-s);padding:8px 16px;border:1px solid var(--color-border-medium);background:none;color:var(--navy);font-size:var(--text-label);letter-spacing:.1em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background var(--t)}
    .btn-copy:hover{background:var(--tint)}
    .notice{background:var(--tint);border-left:2px solid var(--steel);padding:var(--sp-s) var(--sp-l);margin-bottom:var(--sp-2xl)}
    .notice p{font-size:var(--text-xs);color:var(--body);line-height:1.75}
    .notice strong{color:var(--navy)}
    .sum-title{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--steel);margin-bottom:var(--sp-l);display:flex;align-items:center;gap:12px}
    .sum-title::before{content:"";width:20px;height:1px;background:var(--steel);flex-shrink:0}
    .sum-table{width:100%;border-collapse:collapse;margin-bottom:var(--sp-2xl)}
    .sum-table tr{border-bottom:1px solid var(--color-border)}
    .sum-table td{padding:10px 0;vertical-align:top;font-size:13px}
    .sum-table td:first-child{width:40%;color:var(--steel);font-size:var(--text-xs);letter-spacing:.06em;padding-right:var(--sp-l);padding-top:12px;text-transform:uppercase}
    .sum-table td:last-child{color:var(--navy);font-weight:500}
    .sum-table .sec-row td{padding-top:var(--sp-l);padding-bottom:4px;border-bottom:none;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(11,37,69,.35);font-weight:700}
    .confirm-actions{display:flex;gap:var(--sp-m);flex-wrap:wrap;margin-top:var(--sp-xl)}
    .btn-new{display:inline-block;background:var(--navy);color:var(--white);padding:14px 32px;font-size:var(--text-label);letter-spacing:.11em;text-transform:uppercase;font-weight:700;text-decoration:none;transition:opacity var(--t)}
    .btn-new:hover{opacity:.88;color:var(--white)}
    .btn-home{display:inline-block;border:1px solid var(--color-border-medium);color:var(--navy);padding:14px 32px;font-size:var(--text-label);letter-spacing:.11em;text-transform:uppercase;font-weight:600;text-decoration:none;transition:border-color var(--t)}
    .btn-home:hover{border-color:var(--navy);color:var(--navy)}
    .next{margin-top:var(--sp-2xl);padding-top:var(--sp-xl);border-top:1px solid var(--color-border)}
    .next h2{font-size:14px;font-weight:600;letter-spacing:.04em;margin-bottom:var(--sp-l);color:var(--navy)}
    .steps{display:flex;flex-direction:column;gap:var(--sp-m)}
    .step{display:flex;gap:var(--sp-m);align-items:flex-start}
    .step-n{flex-shrink:0;width:24px;height:24px;background:var(--navy);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;letter-spacing:.04em}
    .step-t{font-size:13px;color:var(--body);line-height:1.65;padding-top:3px}
    .no-data{padding:var(--sp-2xl) 0;text-align:center;color:var(--steel)}
    .no-data p{font-size:14px;margin-bottom:var(--sp-l)}
  </style>
</head>
<body>
<div class="page-wrap">
  <nav class="nav" role="navigation" aria-label="Site navigation">
    <div class="nav-inner">
      <a href="https://agim.ca" aria-label="AGI&amp;M home" style="display:flex;align-items:center;gap:11px;flex-shrink:0;text-decoration:none;"><svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true"><rect x="1" y="1" width="11" height="11" fill="#0B2545"/><rect x="14" y="1" width="11" height="11" fill="#4A7FB5"/><rect x="1" y="14" width="11" height="11" fill="#4A7FB5"/><rect x="14" y="14" width="11" height="11" fill="#0B2545"/></svg><span style="font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#0B2545;">AGI&amp;M Assets</span></a>
      <a class="nav-back" href="index.html">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <path d="M7.5 2L3.5 6L7.5 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="square"/>
        </svg>
        New Inquiry
      </a>
    </div>
  </nav>

  <header class="hero" role="banner">
    <div class="hero-inner">
      <div class="kicker">Battery Procurement</div>
      <h1>Inquiry<br><strong>Received</strong></h1>
      <p class="hero-sub">Your sourcing requirements have been submitted to AGI&amp;M. A member of our procurement team will review your inquiry and respond within 3&ndash;5 business days.</p>
    </div>
  </header>

  <main class="form-area" role="main" aria-label="Submission confirmation">
    <div class="confirm-shell" id="confirm-content"></div>
  </main>

  <footer role="contentinfo" style="background:#0B2545;border-top:3px solid #4A7FB5;">
  <div style="max-width:1200px;margin:0 auto;padding:32px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
    <div style="display:flex;align-items:center;gap:11px;">
      <svg width="22" height="22" viewBox="0 0 26 26" fill="none" aria-hidden="true"><rect x="1" y="1" width="11" height="11" fill="#fff"/><rect x="14" y="1" width="11" height="11" fill="rgba(255,255,255,.42)"/><rect x="1" y="14" width="11" height="11" fill="rgba(255,255,255,.42)"/><rect x="14" y="14" width="11" height="11" fill="#fff"/></svg>
      <span style="font-size:13px;font-weight:700;letter-spacing:.02em;color:#fff;">AGI&amp;M Assets Inc.</span>
    </div>
    <span style="font-size:11px;color:rgba(255,255,255,.32);letter-spacing:.04em;">&copy; 2019&ndash;2026 AGI&amp;M ASSETS INC.</span>
  </div>
</footer>
</div>

<script>
(function(){
  'use strict';
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  var LABELS={
    company_name:'Company',contact_name:'Contact',business_email:'Email',country:'Country',
    drone_application:'Application',cell_reference:'Cell Reference',current_manufacturer:'Current Manufacturer',
    chemistry:'Chemistry',nominal_voltage:'Nominal Voltage',capacity_ah:'Capacity (Ah)',
    dim_length_mm:'Length (mm)',dim_width_mm:'Width (mm)',dim_thickness_mm:'Thickness (mm)',
    current_battery_pack:'Battery Pack',dimension_flex:'Dimension Flex',discharge_rate:'Discharge Rate',
    weight_sensitivity:'Weight Sensitivity',certifications:'Certifications',
    annual_volume:'Annual Volume',procurement_priority:'Procurement Priority',
    lead_time:'Lead Time',sample_required:'Samples Needed',sample_quantity:'Sample Qty',
    additional_notes:'Additional Notes'
  };
  var S1=['company_name','contact_name','business_email','country'];
  var S2=['drone_application','cell_reference','current_manufacturer','chemistry','nominal_voltage','capacity_ah','dim_length_mm','dim_width_mm','dim_thickness_mm','current_battery_pack','dimension_flex','discharge_rate','weight_sensitivity','certifications'];
  function secOf(k){if(S1.indexOf(k)>-1)return'Company Information';if(S2.indexOf(k)>-1)return'Battery Requirements';return'Commercial Requirements';}
  var ORDER=['company_name','contact_name','business_email','country','drone_application','cell_reference','current_manufacturer','chemistry','nominal_voltage','capacity_ah','dim_length_mm','dim_width_mm','dim_thickness_mm','current_battery_pack','dimension_flex','discharge_rate','weight_sensitivity','certifications','annual_volume','procurement_priority','lead_time','sample_required','sample_quantity','additional_notes'];

  function render(data){
    var shell=document.getElementById('confirm-content');
    if(!shell)return;
    var lastSec=null,rows='';
    ORDER.forEach(function(k){
      var v=data[k];
      if(!v||v===''||v==='0')return;
      var sec=secOf(k);
      if(sec!==lastSec){rows+='<tr class="sec-row"><td colspan="2">'+esc(sec)+'</td></tr>';lastSec=sec;}
      rows+='<tr><td>'+esc(LABELS[k]||k)+'</td><td>'+esc(v)+'</td></tr>';
    });
    shell.innerHTML=
      '<div class="status-banner" role="status">'+
        '<svg class="status-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true"><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M6 10l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>'+
        '<span class="status-text">Inquiry Submitted Successfully</span>'+
      '</div>'+
      '<div class="id-block">'+
        '<span class="id-label">Inquiry Reference Number</span>'+
        '<span class="id-value" id="iid">'+esc(data.inquiry_id)+'</span>'+
        '<span class="id-ts">Submitted: '+esc(data.submitted_at)+'</span>'+
        '<button class="btn-copy" id="copy-btn" type="button" aria-label="Copy inquiry ID">'+
          '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><rect x="4" y="4" width="7" height="7" stroke="currentColor" stroke-width="1.2"/><path d="M1 8V1h7" stroke="currentColor" stroke-width="1.2"/></svg>'+
          'Copy ID'+
        '</button>'+
      '</div>'+
      '<div class="notice"><p><strong>Submitted records cannot be edited.</strong> If your requirements change, submit a new inquiry referencing this ID. Note: Phase&nbsp;1 submissions are stored via Formspree. Database-level immutability is implemented in Phase&nbsp;2.</p></div>'+
      '<div class="sum-title">Submission Summary</div>'+
      '<table class="sum-table" aria-label="Submitted inquiry details"><tbody>'+rows+'</tbody></table>'+
      '<div class="confirm-actions">'+
        '<a class="btn-new" href="index.html">Submit Another Inquiry</a>'+
        '<a class="btn-home" href="https://agim.ca">Return to AGI&amp;M</a>'+
      '</div>'+
      '<div class="next"><h2>What happens next</h2><div class="steps">'+
        '<div class="step"><span class="step-n">1</span><p class="step-t">AGI&amp;M reviews your requirements and verifies completeness, typically within 1 business day.</p></div>'+
        '<div class="step"><span class="step-n">2</span><p class="step-t">An RFQ is issued to qualified battery cell manufacturers. Your identity is not disclosed to suppliers.</p></div>'+
        '<div class="step"><span class="step-n">3</span><p class="step-t">AGI&amp;M collects and compares supplier responses on price, certification, and lead time.</p></div>'+
        '<div class="step"><span class="step-n">4</span><p class="step-t">You receive an AGI&amp;M quotation referencing Inquiry ID: <strong>'+esc(data.inquiry_id)+'</strong>.</p></div>'+
      '</div></div>';
    var cb=document.getElementById('copy-btn');
    if(cb)cb.addEventListener('click',function(){
      var id=data.inquiry_id;
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(id).then(function(){cb.textContent='Copied';setTimeout(function(){cb.textContent='Copy ID';},2500);});}
      else{var ta=document.createElement('textarea');ta.value=id;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);cb.textContent='Copied';setTimeout(function(){cb.textContent='Copy ID';},2500);}
    });
  }

  function noData(){
    var s=document.getElementById('confirm-content');
    if(s)s.innerHTML='<div class="no-data"><p>No submission data found. This page should only be visited after submitting the inquiry form.</p><a class="btn-new" href="index.html">Return to Inquiry Form</a></div>';
  }

  document.addEventListener('DOMContentLoaded',function(){
    var raw=null;
    try{raw=sessionStorage.getItem('agim_inquiry_result');}catch(e){}
    if(raw){
      try{render(JSON.parse(raw));try{sessionStorage.removeItem('agim_inquiry_result');}catch(e){}}
      catch(e){noData();}
    } else {
      var id=new URLSearchParams(window.location.search).get('id');
      if(id){render({inquiry_id:id,submitted_at:new Date().toUTCString()});}
      else{noData();}
    }
  });
}());
</script>
</body>
</html>
